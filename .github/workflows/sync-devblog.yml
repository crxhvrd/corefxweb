name: Sync devblog from Discord

on:
  schedule:
    # Every 5 minutes. GitHub's cron is best-effort and may skip ticks under heavy load.
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-devblog
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Discord messages
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_ANNOUNCEMENT_CHANNEL_ID: '1080896900926017686'
          DISCORD_GUILD_ID: '963349840681639946'
          POST_LIMIT: '30'
        run: node scripts/sync-devblog.mjs

      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain data/devblog-posts.json)" ]]; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/devblog-posts.json
          git commit -m "chore(devblog): sync from Discord"
          git push
